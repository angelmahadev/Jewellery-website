<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Placed</title>
  <style>
    body {
      background-color: #cab273;
      text-align: center;
      font-family: Arial, sans-serif;
      color: #333;
      padding: 50px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }
    .icon {
      font-size: 80px;
      color: #333;
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0;
    }
    .progress-bar {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
      position: relative;
    }
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 4px;
      background: #ccc;
      z-index: 0;
      transform: translateY(-50%);
    }
    .step {
      background: #fff;
      padding: 10px 15px;
      border-radius: 20px;
      border: 2px solid #333;
      z-index: 1;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .step.active {
      background-color: #cab273;
      color: white;
      border-color: #cab273;
    }
    #deliveryDate {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128722;</div>
    <h1>Your Order is Placed</h1>

    <div class="progress-bar">
      <div class="step" id="step1">Placed</div>
      <div class="step" id="step2">Shipped</div>
      <div class="step" id="step3">Out for Delivery</div>
      <div class="step" id="step4">Delivered</div>
    </div>

    <p id="deliveryDate"></p>
  </div>

  <script>
    // Manually set order date (YYYY-MM-DD format)
    const orderDateStr = "2025-05-29";
    const orderDate = new Date(orderDateStr);
    const today = new Date();

    // Remove time for accurate day comparison
    orderDate.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);

    // Calculate days passed since order date
    const timeDiff = today - orderDate;
    const daysPassed = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

    // Calculate estimated delivery date (order + 3 days)
    const deliveryDate = new Date(orderDate);
    deliveryDate.setDate(orderDate.getDate() + 3);
    const deliveryDateStr = deliveryDate.toLocaleDateString(undefined, {
      year: "numeric", month: "long", day: "numeric"
    });

    // Update progress bar steps
    const steps = ["step1", "step2", "step3", "step4"];
    for (let i = 0; i <= daysPassed && i < steps.length; i++) {
      document.getElementById(steps[i]).classList.add("active");
    }

    // Display estimated delivery date
    const deliveryText = document.getElementById("deliveryDate");
    if (daysPassed >= 3) {
      deliveryText.textContent = "Your order was delivered on " + deliveryDateStr + ".";
    } else {
      deliveryText.textContent = "Estimated delivery date: " + deliveryDateStr;
    }
  </script>
</body>
</html>
